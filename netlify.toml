[build]
  command = "echo 'Building PDFMind'"
  publish = "frontend"
  functions = "backend"

[build.environment]
  NODE_VERSION = "22.22.2"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
